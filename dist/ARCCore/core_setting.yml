# 创建公会费用（默认十万）
GUILD_CREATE_COST=100000
# 公会规模：每个公会有 small / medium / large 三档规模等级，新建公会默认 small
# 下列三个值为各等级的成员人数上限（含会长）；OP 可在「OP 面板 → 公会管理」中直接升级/降级公会规模（无消耗）
GUILD_SIZE_SMALL_MAX=10
GUILD_SIZE_MEDIUM_MAX=20
GUILD_SIZE_LARGE_MAX=40
# 公会升级规模消耗的「公会公共贡献点」（玩家通过完成小游戏等方式获得，并由 api_add_guild_contribution 累加）
# 会长 / 管理员可在「我的公会 → 升级公会规模」中花费公共贡献点升级；下列两个值为升级到对应等级的消耗
GUILD_UPGRADE_TO_MEDIUM_COST=10000
GUILD_UPGRADE_TO_LARGE_COST=100000
