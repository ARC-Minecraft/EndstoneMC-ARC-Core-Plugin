GUILD_LAND_TELEPORT_CONTRIB_COST=10
# 击杀生物 → 公会贡献点比例（搭配 kill_reward.txt 使用）
# 计算公式：贡献点 = floor(击杀金钱奖励 * 比例)；例如击杀奖励 10 元，比例 0.5，则获得 5 公会贡献点
# 仅当玩家已加入公会时生效；未加入公会则静默跳过；设为 0 关闭该功能
KILL_REWARD_GUILD_CONTRIB_RATIO=0.5

